<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Earn App Pro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Lock Screen -->
<div id="lockScreen">
  <h2>Subscribe First</h2>
  <button onclick="window.open('https://www.youtube.com/@Mamme234')">Subscribe</button>
  <button onclick="unlock()">I Subscribed</button>
</div>

<!-- Home Screen -->
<div id="home" class="screen active">
  <div class="card">
    <h2>💰 Coins: <span id="balance">0</span></h2>
    <h3>USDT: <span id="usdt">0.00</span></h3>
    <div>Level: <span id="level">1</span></div>
  </div>

  <div id="coinBtn"></div>

  <div class="card">
    <div>Next Level</div>
    <div style="background:#333">
      <div id="progress"></div>
    </div>
  </div>
</div>

<!-- Profile Screen -->
<div id="profile" class="screen">
  <div class="card">
    <h3>👤 Profile</h3>
    <div id="username">User</div>
    <div id="telegramId">Telegram: @username</div>
  </div>

  <div class="item" onclick="daily()">🎁 Daily Reward</div>

  <div class="card">
    <h3>📲 Social Tasks</h3>
    <div class="item" onclick="socialTask('telegram')" id="tgTask">📢 Join Telegram (+500)</div>
    <div class="item" onclick="socialTask('tiktok')" id="ttTask">🎵 Follow TikTok (+1000)</div>
  </div>

  <div class="card">
    <h3>🎡 Spin Wheel</h3>
    <button onclick="spin()">Spin</button>
  </div>

  <div class="card">
    <h3>👥 Referral</h3>
    <a id="refLink" href="#" target="_blank">Invite Friends</a>
    <div>Invites: <span id="refCount">0</span></div>
  </div>
</div>

<!-- Withdraw Screen -->
<div id="withdraw" class="screen">
  <div class="card">
    <h3>Withdraw</h3>
    <input id="wallet" placeholder="User Wallet">
    <input id="amount" placeholder="USDT amount">
    <button onclick="withdraw()">Submit</button>
  </div>
</div>

<!-- Nav -->
<div id="nav">
  <button onclick="show('home')">Home</button>
  <button onclick="show('profile')">Profile</button>
  <button onclick="show('withdraw')">Withdraw</button>
</div>

<script src="app.js"></script>
</body>
</html>
