<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Earn App Admin</title>
<link rel="stylesheet" href="admin.css">
</head>
<body>
<h1>💼 Admin Panel</h1>

<div class="stats">
  <div>Total Users: <span id="totalUsers">0</span></div>
  <div>Total Coins: <span id="totalCoins">0</span></div>
  <div>Total Withdrawals: <span id="totalWithdrawals">0</span></div>
</div>

<h2>Pending Withdrawals</h2>
<table id="withdrawTable">
  <thead>
    <tr>
      <th>User ID</th>
      <th>Wallet</th>
      <th>Amount</th>
      <th>Status</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script src="admin.js"></script>
</body>
</html>
